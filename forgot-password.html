<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password — ScriptFlare</title>
  <link rel="stylesheet" href="account.css">
</head>
<body class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">
      <a href="index.html">Script<span>Flare</span> 🔥</a>
    </div>
    <h1 class="auth-title">Reset password</h1>
    <p class="auth-subtitle">Enter your email and we'll send you a reset link</p>

    <div class="auth-error" id="authError"></div>
    <div class="auth-success" id="authSuccess" style="display:none; background:rgba(34,197,94,0.12); border:1px solid rgba(34,197,94,0.3); color:#22c55e; border-radius:10px; padding:12px 16px; font-size:0.9rem; margin-bottom:16px;"></div>

    <form id="forgotForm">
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" placeholder="you@example.com" required autocomplete="email">
      </div>
      <button type="submit" class="btn-auth" id="submitBtn">Send Reset Link</button>
    </form>

    <p class="auth-switch">
      <a href="login.html">← Back to sign in</a>
    </p>
  </div>

  <script>
    const API = 'https://scriptflare-backend-production.up.railway.app';

    document.getElementById('forgotForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('submitBtn');
      const errEl = document.getElementById('authError');
      const sucEl = document.getElementById('authSuccess');

      errEl.classList.remove('visible');
      sucEl.style.display = 'none';
      btn.disabled = true;
      btn.textContent = 'Sending…';

      const email = document.getElementById('email').value;

      try {
        const res = await fetch(`${API}/auth/forgot-password`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email }),
        });

        const data = await res.json();
        sucEl.textContent = data.message || 'Check your email for the reset link.';
        sucEl.style.display = 'block';
        document.getElementById('forgotForm').style.display = 'none';
      } catch (err) {
        errEl.textContent = 'Something went wrong. Please try again.';
        errEl.classList.add('visible');
        btn.disabled = false;
        btn.textContent = 'Send Reset Link';
      }
    });
  </script>
</body>
</html>
