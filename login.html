<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In — ScriptFlare</title>
  <link rel="stylesheet" href="account.css">
</head>
<body class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">
      <a href="index.html">Script<span>Flare</span> 🔥</a>
    </div>
    <h1 class="auth-title">Welcome back</h1>
    <p class="auth-subtitle">Sign in to your ScriptFlare account</p>

    <div class="auth-error" id="authError"></div>

    <form id="loginForm">
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" placeholder="you@example.com" required autocomplete="email">
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="••••••••" required autocomplete="current-password">
      </div>
      <button type="submit" class="btn-auth" id="loginBtn">Sign In</button>
    </form>

    <p class="auth-switch">
      Don't have an account? <a href="signup.html">Sign up free →</a>
    </p>
  </div>

  <script>
    const API = 'https://scriptflare-backend-production.up.railway.app';

    // Redirect if already logged in
    if (localStorage.getItem('sf_token')) {
      window.location.href = 'account.html';
    }

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('loginBtn');
      const errEl = document.getElementById('authError');
      errEl.classList.remove('visible');
      btn.disabled = true;
      btn.textContent = 'Signing in…';

      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;

      try {
        const res = await fetch(`${API}/auth/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password }),
        });

        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Login failed');

        localStorage.setItem('sf_token', data.token);
        localStorage.setItem('sf_user', JSON.stringify(data.user));
        localStorage.setItem('sf_pro', data.user.tier !== 'free' ? '1' : '');

        // Redirect back to where they came from, or account page
        const returnTo = new URLSearchParams(window.location.search).get('from');
        window.location.href = returnTo || 'account.html';
      } catch (err) {
        errEl.textContent = err.message;
        errEl.classList.add('visible');
        btn.disabled = false;
        btn.textContent = 'Sign In';
      }
    });
  </script>
</body>
</html>
