<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Set New Password — ScriptFlare</title>
  <link rel="stylesheet" href="account.css">
</head>
<body class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">
      <a href="index.html">Script<span>Flare</span> 🔥</a>
    </div>
    <h1 class="auth-title" id="pageTitle">Set new password</h1>
    <p class="auth-subtitle" id="pageSubtitle">Choose a strong password for your account</p>

    <div class="auth-error" id="authError"></div>

    <form id="resetForm">
      <div class="form-group">
        <label for="password">New Password</label>
        <input type="password" id="password" placeholder="Min. 8 characters" required autocomplete="new-password" minlength="8">
      </div>
      <div class="form-group">
        <label for="confirmPassword">Confirm Password</label>
        <input type="password" id="confirmPassword" placeholder="Repeat password" required autocomplete="new-password" minlength="8">
      </div>
      <button type="submit" class="btn-auth" id="submitBtn">Set New Password</button>
    </form>

    <div id="successState" style="display:none; text-align:center; padding:16px 0;">
      <p style="color:#22c55e; font-size:1rem; margin-bottom:16px;">✅ Password updated successfully!</p>
      <a href="login.html" class="btn-auth" style="display:inline-block; text-decoration:none;">Sign In →</a>
    </div>

    <p class="auth-switch">
      <a href="login.html">← Back to sign in</a>
    </p>
  </div>

  <script>
    const API = 'https://scriptflare-backend-production.up.railway.app';

    // Supabase sends the recovery token in the URL hash: #access_token=...&type=recovery
    // Parse it on page load
    let accessToken = null;

    function parseHashParams() {
      const hash = window.location.hash.substring(1);
      const params = new URLSearchParams(hash);
      return {
        access_token: params.get('access_token'),
        type: params.get('type'),
      };
    }

    const hashParams = parseHashParams();

    if (!hashParams.access_token || hashParams.type !== 'recovery') {
      // No valid reset token — show error
      document.getElementById('pageTitle').textContent = 'Link expired';
      document.getElementById('pageSubtitle').textContent = 'This reset link is invalid or has expired.';
      document.getElementById('resetForm').style.display = 'none';
      const errEl = document.getElementById('authError');
      errEl.textContent = 'Request a new reset link from the login page.';
      errEl.classList.add('visible');
    } else {
      accessToken = hashParams.access_token;
    }

    document.getElementById('resetForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('submitBtn');
      const errEl = document.getElementById('authError');
      errEl.classList.remove('visible');

      const password = document.getElementById('password').value;
      const confirm = document.getElementById('confirmPassword').value;

      if (password.length < 8) {
        errEl.textContent = 'Password must be at least 8 characters';
        errEl.classList.add('visible');
        return;
      }
      if (password !== confirm) {
        errEl.textContent = 'Passwords do not match';
        errEl.classList.add('visible');
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Updating…';

      try {
        const res = await fetch(`${API}/auth/reset-password`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ access_token: accessToken, new_password: password }),
        });

        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Reset failed');

        document.getElementById('resetForm').style.display = 'none';
        document.getElementById('successState').style.display = 'block';
        // Clear any stored session for this user so they log in fresh
        localStorage.removeItem('sf_token');
        localStorage.removeItem('sf_user');
        localStorage.removeItem('sf_pro');
      } catch (err) {
        errEl.textContent = err.message;
        errEl.classList.add('visible');
        btn.disabled = false;
        btn.textContent = 'Set New Password';
      }
    });
  </script>
</body>
</html>
